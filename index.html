<!DOCTYPE html>

<title>SOBAT GS - Monopoli Kampung</title>

<link rel="stylesheet" href="style.css">
</head>

<div class="container">

    <div class="board-section">
        <img src="board.png" id="board">

        <div id="currentPlayer">

        <div id="players">
            <div>Pemain 1 : Rp200.000</div>

</div>

</html>
