<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ SOBAT GS - Monopoli Kampung</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="board-section">

        <div id="boardWrapper">

            <img src="board2.png" id="board">

            <div id="player1" class="token red">1</div>
            <div id="player2" class="token blue">2</div>
            <div id="player3" class="token green">3</div>
            <div id="player4" class="token yellow">4</div>

        </div>

    </div>

    <div class="panel">

        <h1>⚽ SOBAT GS</h1>
        <h3>Kampung Griya Santika</h3>

        <div class="card">
            <label>Jumlah Pemain</label>

            <select id="playerCount">
                <option value="2">2 Pemain</option>
                <option value="3">3 Pemain</option>
                <option value="4">4 Pemain</option>
            </select>

            <button id="startBtn">
                Mulai Permainan
            </button>
        </div>

        <div class="card">
            <h2 id="currentPlayer">
                Giliran: -
            </h2>

            <h2 id="diceResult">
                🎲 -
            </h2>

            <button id="rollBtn" disabled>
                🎲 Lempar Dadu
            </button>
        </div>

        <div class="card">
            <h3>Daftar Pemain</h3>

            <div id="players">
                Belum ada pemain
            </div>
        </div>

        <div class="card">
            <h3>Aktivitas</h3>

            <div id="log">
                Klik "Mulai Permainan"
            </div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
